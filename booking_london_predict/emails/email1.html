<!doctype html>
<html lang="uk" xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="x-apple-disable-message-reformatting">
    <title>PIED-DE-POULE • {{email_title}}</title>
    <style>
      
      /* --- TABLET --- */
      @media screen and (max-width:768px){
        .container{width:100% !important}
        .px{padding-left:24px !important;padding-right:24px !important}
        .stack{display:block !important;width:100% !important;text-align:center !important;border-left:0 !important}
        .btn{display:block !important;width:100% !important;text-align:center !important;height:auto !important;line-height:1.3 !important;padding-top:14px !important;padding-bottom:14px !important}
        .center-sm{text-align:center !important}
        .mt-sm-12{margin-top:12px !important}
        .mb16{margin-bottom:16px !important}
        .col-label{width:auto !important;padding:4px 0 8px 0 !important}
        .col-list{padding-top:0 !important}
        .col-label,.col-list{text-align:center !important}
        .actions td{display:block !important;width:100% !important;padding:0 0 16px 0 !important;text-align:center !important}
        .actions td.last{padding-bottom:0 !important}
        .footer-links table{margin-left:auto !important;margin-right:auto !important}
        .table-btns{padding: 20px;}
      }

       /* --- MOBILE --- */
      @media screen and (max-width:480px){
        .px{padding-left:20px !important;padding-right:20px !important}
        .brand-title{font-size:32px !important;letter-spacing:4px !important}
        .brand-subtitle{font-size:11px !important;letter-spacing:2px !important}
      }
      /* Dark mode helpers */
      @media (prefers-color-scheme: dark){
        body,.email-bg{background:#0b0b0b !important;color:#eaeaea !important}
        .card{background:#151515 !important;border-color:#2a2a2a !important}
        .muted{color:#b8b8b8 !important}
        .btn-outline{background:#0b0b0b !important;border-color:#e2e2e2 !important;color:#eaeaea !important}
        .btn-primary{background:#e2e2e2 !important;color:#0b0b0b !important}
        .rule{border-color:#2a2a2a !important}
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#ffffff;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
    <!-- Preheader -->
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
      {{preheader}}
    </div>

    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" class="email-bg" style="background:#ffffff;">
      <tr>
        <td align="center" style="padding:0;">
          <table role="presentation" cellpadding="0" cellspacing="0" width="100%" class="container" style="max-width:600px;margin:0 auto;">
            <!-- TOP BRAND BAR -->
            <tr>
              <td style="padding:24px 32px;background:#ffffff;border-bottom:1px solid #e3e3e3;" align="center">
                <img src="/static/img/email/Mask.png" alt="PIED-DE-POULE Beauty Salon" width="180" style="display:inline-block;border:0;height:auto;">
              </td>
            </tr>

            <!-- HERO -->
            <tr>
              <td style="padding:0;">
                <img src="{{hero_image}}" alt="Service" width="600" style="display:block;width:100%;height:auto;border:0;line-height:0;">
              </td>
            </tr>

            <!-- INTRO -->
            <tr>
              <td class="px" style="padding:28px 32px 6px 32px;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td class="center-sm" style="font-family:Arial, Helvetica, sans-serif;font-size:24px;line-height:1.2;font-weight:800;color:#0b0b0b;">
                      {{client_name}},
                    </td>
                    <td align="right" class="center-sm" style="font-family:Arial, Helvetica, sans-serif;font-size:18px;color:#0b0b0b;">
                      <img src="./imgs/logo-icon.png" alt="PIED-DE-POULE" width="24" style="display:block;border:0;">
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td class="px center-sm" style="padding:43px 32px 53px 32px;">
                <p style="margin:0;font-family:Arial, Helvetica, sans-serif;font-size:18px;line-height:1.5;font-weight: 400; color:#000000CC;">
                  {{email_intro}}
                </p>
              </td>
            </tr>

          
           {{service_sections}}

            <!-- FOOTER LINKS -->
            <tr>
              <td class="px rule footer-links" style="padding:70px 32px 70px 32px;border-top:1px solid #dcdcdc;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td class="stack center-sm" style="padding:6px 0;" valign="middle" align="center">
                      <img src="/static/img/email/Mask.png" alt="PIED-DE-POULE Beauty Salon" width="180" style="display:inline-block;border:0;height:auto;margin:0 auto;">
                    </td>
                    <td class="stack center-sm mt-sm-12" style="padding:6px 0;" align="center">
                        <table role="presentation" cellpadding="0" cellspacing="0" align="center">
                          <tr>
                            <td align="center" style="padding:0;">
                              <a href="{{link_services}}" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;line-height:1.8;color:#0b0b0b;text-decoration:none;border-bottom: 0.5px solid #000000;">{{footer_services}}</a>
                            </td>
                          </tr>
                          <tr>
                            <td align="center" style="padding:0;">
                              <a href="{{link_salons}}" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;line-height:1.8;color:#0b0b0b;text-decoration:none;border-bottom: 0.5px solid #000000;">{{footer_salons}}</a>
                            </td>
                          </tr>
                          <tr>
                            <td align="center" style="padding:0;">
                              <a href="{{link_certificates}}" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;line-height:1.8;color:#0b0b0b;text-decoration:none;border-bottom: 0.5px solid #000000;">{{footer_certificates}}</a>
                            </td>
                          </tr>
                        </table>
                      </td>
                      <td class="stack center-sm mt-sm-12" style="padding:6px 0;" align="center">
                     <table role="presentation" cellpadding="0" cellspacing="0" align="center">
                        <tr>
                          <td align="center" style="padding:0;">
                            <a href="{{link_instagram}}" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;line-height:1.8;color:#0b0b0b;text-decoration:none;border-bottom: 0.5px solid #000000;">INSTAGRAM</a>
                          </td>
                        </tr>
                        <tr>
                          <td align="center" style="padding:0;">
                            <a href="{{link_telegram_bot}}" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;line-height:1.8;color:#0b0b0b;text-decoration:none;border-bottom: 0.5px solid #000000;">TELEGRAM&nbsp;BOT</a>
                          </td>
                        </tr>
                        <tr>
                          <td align="center" style="padding:0;">
                            <a href="{{link_facebook}}" style="font-family:Arial, Helvetica, sans-serif;font-size:13px;line-height:1.8;color:#0b0b0b;text-decoration:none;border-bottom: 0.5px solid #000000;">FACEBOOK</a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- LEGAL -->
            <tr>
              <td class="px rule" style="padding:12px 32px 40px 32px;border-top:1px solid #dcdcdc;text-align:center;">
                <div class="muted" style="font-family:Arial, Helvetica, sans-serif;font-size:12px;color:#6e6e6e;margin-bottom:6px;">
                  2025, PIED-DE-POULE
                </div>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
