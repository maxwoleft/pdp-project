# /etc/nginx/sites-available/ai-chat
# ln -s /etc/nginx/sites-available/ai-chat /etc/nginx/sites-enabled/
# certbot --nginx -d ai-chat.p-de-p.com  → автоматично додає SSL

server {
    server_name ai-chat.p-de-p.com;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Все інше — на uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;     # web chat: agent tool-loop може займати до ~2 хв
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        client_max_body_size 25M;  # для голосових/фото від клієнтів TG

        # WebSocket-friendly (на випадок майбутнього)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gzip для admin UI
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ai-chat.p-de-p.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ai-chat.p-de-p.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = ai-chat.p-de-p.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name ai-chat.p-de-p.com;
    return 404; # managed by Certbot


}