# /etc/nginx/sites-available/pdpbooking
# ln -s /etc/nginx/sites-available/pdpbooking /etc/nginx/sites-enabled/
# certbot --nginx -d booking.p-de-p.com  → автоматично додає SSL

server {
    server_name booking.p-de-p.com;

    # certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Static files served by nginx directly (швидше за gunicorn)
    location /static/ {
        alias /opt/pdpbooking/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Everything else → gunicorn
    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;     # payment monitoring + CRM API можуть бути повільні
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        client_max_body_size 25M;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # listen 443 ssl;  # managed by Certbot — додасть автоматично після первинного certbot run
    listen 80;
}
