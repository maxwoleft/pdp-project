<!DOCTYPE html>
<html lang="uk" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>{% block title %}Mira — AI помічник{% endblock %}</title>
  <!-- Tailwind Play CDN: dev/prototyping only. Перед production замінити на build-time tailwind. -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"
          integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
          crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-bg: #f8fafc;
      --c-panel: #ffffff;
      --c-accent: #0f172a;
      --c-accent-2: #6366f1;
      --c-user: #0f172a;
      --c-assistant: #f1f5f9;
      --c-text: #0f172a;
      --c-text-muted: #64748b;
    }
    html, body { height: 100dvh; }
    @supports not (height: 100dvh) {
      html, body { height: 100vh; }
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      -webkit-tap-highlight-color: transparent;
    }
    [x-cloak] { display: none !important; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .chat-bubble {
      max-width: 75%;
      font-size: 15px;
      line-height: 1.3;
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      overflow-wrap: anywhere;  /* break only at content boundary, not mid-word */
    }
    @media (max-width: 640px) {
      .chat-bubble { max-width: 85%; }
    }
    .chat-bubble.user {
      background: #0f172a;
      color: #fff;
      border-bottom-right-radius: 4px !important;
    }
    .chat-bubble.assistant {
      background: #fff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px !important;
    }
    .chat-bubble * { margin: 0 !important; }
    .chat-bubble br + br { display: none; }  /* схлопнути подвійні <br> */
    .bubble-in { animation: bubble-in .18s ease-out both; }
    @keyframes bubble-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .typing-dot { animation: typing 1.2s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }
    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: .35; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
  </style>
</head>
<body class="h-full antialiased">
{% block body %}{% endblock %}
</body>
</html>
