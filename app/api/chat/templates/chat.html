{% extends "_base.html" %}
{% block title %}Mira — чат{% endblock %}
{% block body %}
<div class="h-full flex flex-col" x-data="chatApp({ country: '{{ country }}', chatId: '{{ chat_id }}' })" x-init="init()">

  <!-- Header -->
  <header class="shrink-0 bg-white border-b border-slate-200">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-9 h-9 rounded-full bg-slate-900 text-white flex items-center justify-center font-semibold">M</div>
        <div class="min-w-0">
          <div class="font-semibold text-slate-900 leading-tight truncate">Mira</div>
          <div class="text-[11px] text-slate-500 flex items-center gap-1.5 min-w-0">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shrink-0"></span>
            <span x-text="online ? 'на зв\'язку' : 'офлайн'"></span>
            {% if salon %}
              <span class="text-slate-300">·</span>
              <span class="truncate">{{ salon.name }}{% if salon.address %} · {{ salon.address }}{% endif %}</span>
            {% else %}
              <span class="text-slate-300">·</span>
              <span x-text="country.toUpperCase()"></span>
            {% endif %}
          </div>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button type="button"
                @click="reset()"
                title="Новий діалог"
                class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-slate-900 transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <a href="/chat/restart" title="Змінити регіон/салон"
           class="p-2 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-slate-900 transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- Messages -->
  <main class="flex-1 overflow-y-auto scrollbar-thin" x-ref="scrollArea">
    <div class="max-w-3xl mx-auto px-3 sm:px-4 py-4 space-y-1.5">

      <!-- Empty state / welcome -->
      <template x-if="messages.length === 0 && !loadingHistory">
        <div class="py-6 px-1 sm:px-2">
          <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-11 h-11 rounded-full bg-slate-900 text-white flex items-center justify-center text-lg font-semibold">M</div>
              <div>
                <div class="font-semibold text-slate-900">Доброго дня. Я — Mira.</div>
                {% if salon %}<div class="text-[12px] text-slate-500">{{ salon.name }}{% if salon.address %} · {{ salon.address }}{% endif %}</div>{% endif %}
              </div>
            </div>

            <p class="text-[14px] text-slate-700 leading-snug mb-3">
              Опишіть свою задачу або проблему — який вигляд хочете отримати, що вас турбує, що бажаєте оновити. Я підберу послугу, перевірю вільний час майстрів і допоможу записатися.
            </p>

            <div class="mt-3 text-[12px] text-slate-500 font-medium mb-1.5">Що я вмію:</div>
            <ul class="text-[13px] text-slate-700 space-y-1">
              <li class="flex items-start gap-2"><span>💬</span><span>підбирати послугу за описом потреби</span></li>
              <li class="flex items-start gap-2"><span>🎙</span><span>розуміти голосові повідомлення</span></li>
              <li class="flex items-start gap-2"><span>📷</span><span>аналізувати фото (нігті, волосся, шкіра)</span></li>
              <li class="flex items-start gap-2"><span>👤</span><span>знаходити майстра та вільні години</span></li>
              <li class="flex items-start gap-2"><span>📅</span><span>створювати запис у салон</span></li>
            </ul>

            <div class="mt-4 text-[12px] text-slate-500">Просто напишіть або скажіть голосом — наприклад: <span class="italic">«нігті обламуються, хочу гель», «потрібно оновити корені на завтра», «зробіть стрижку у п'ятницю ввечері»</span>.</div>
          </div>
        </div>
      </template>

      <template x-for="(m, idx) in messages" :key="idx">
        <div class="bubble-in" :style="'text-align:' + (m.role === 'user' ? 'right' : 'left') + ';'">
          <template x-if="m.image">
            <div :style="'text-align:' + (m.role === 'user' ? 'right' : 'left') + ';margin-bottom:4px;'">
              <img :src="m.image" style="border-radius:10px;max-height:280px;max-width:78%;object-fit:cover;display:inline-block;" alt="фото">
            </div>
          </template>
          <div class="chat-bubble"
               style="margin:0 !important;padding:6px 12px !important;line-height:1.35 !important;font-size:15px !important;max-width:78%;border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.05);display:inline-block;text-align:left;vertical-align:top;"
               :class="m.role === 'user' ? 'user' : 'assistant'"
               x-html="m.role === 'user' ? escapeHtml(m.content) : renderMd(m.content)"></div>
        </div>
      </template>

      <!-- Typing indicator / progress -->
      <div x-show="sending" x-cloak class="flex justify-start">
        <div class="bg-white border border-slate-200 rounded-2xl rounded-bl-sm px-3 py-2 shadow-sm">
          <div class="flex items-center gap-2">
            <div class="flex items-center gap-1">
              <span class="typing-dot w-1.5 h-1.5 rounded-full bg-slate-400 inline-block"></span>
              <span class="typing-dot w-1.5 h-1.5 rounded-full bg-slate-400 inline-block"></span>
              <span class="typing-dot w-1.5 h-1.5 rounded-full bg-slate-400 inline-block"></span>
            </div>
            <span x-show="progressLabel" class="text-[13px] text-slate-500" x-text="progressLabel"></span>
          </div>
        </div>
      </div>

      <!-- Error toast -->
      <div x-show="errorMsg" x-cloak class="flex justify-center">
        <div class="text-xs text-rose-600 bg-rose-50 border border-rose-200 px-3 py-1.5 rounded-lg" x-text="errorMsg"></div>
      </div>
    </div>
  </main>

  <!-- Voice recording overlay -->
  <div x-show="recording" x-cloak class="fixed inset-x-0 bottom-24 sm:bottom-28 z-30 flex justify-center pointer-events-none">
    <div class="pointer-events-auto bg-slate-900 text-white px-4 py-2 rounded-full flex items-center gap-3 shadow-lg">
      <span class="relative flex h-3 w-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-3 w-3 bg-rose-500"></span>
      </span>
      <span class="text-sm tabular-nums" x-text="recDuration"></span>
      <button type="button" @click="cancelRecording()" class="text-xs underline opacity-80 hover:opacity-100">скасувати</button>
    </div>
  </div>

  <!-- Voice preview (after stop recording, before send) -->
  <div x-show="voicePreviewBlob" x-cloak class="border-t border-slate-200 bg-white">
    <div class="max-w-3xl mx-auto px-3 sm:px-4 py-3">
      <div class="flex items-center gap-2.5 mb-2.5">
        <button type="button" @click="toggleVoicePreview()"
                class="shrink-0 w-10 h-10 rounded-full bg-violet-600 hover:bg-violet-700 text-white flex items-center justify-center shadow-sm transition">
          <svg x-show="!voicePreviewPlaying" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg x-show="voicePreviewPlaying" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
        </button>
        <div class="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
          <div class="h-full bg-violet-500 rounded-full" :style="`width: ${voicePreviewProgress}%`"></div>
        </div>
        <span class="text-xs text-slate-500 font-mono tabular-nums shrink-0" x-text="voicePreviewDuration"></span>
        <audio x-ref="previewAudio" :src="voicePreviewUrl" class="hidden"
               @timeupdate="onPreviewProgress()" @ended="voicePreviewPlaying=false; voicePreviewProgress=0"></audio>
      </div>
      <div class="flex items-center gap-2 justify-end">
        <button type="button" @click="discardVoicePreview()"
                class="px-3 py-1.5 text-[13px] text-slate-600 hover:text-slate-900 rounded-lg hover:bg-slate-100 transition">
          Скасувати
        </button>
        <button type="button" @click="rerecordVoice()"
                class="px-3 py-1.5 text-[13px] bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg flex items-center gap-1.5 transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1.06 6.64 2.92L21 8"/><path d="M21 3v5h-5"/></svg>
          Перезаписати
        </button>
        <button type="button" @click="sendVoicePreview()"
                class="px-4 py-1.5 text-[13px] bg-gradient-to-br from-violet-600 to-violet-700 hover:from-violet-700 hover:to-violet-800 text-white rounded-lg font-medium shadow-sm flex items-center gap-1.5 transition">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Надіслати
        </button>
      </div>
    </div>
  </div>

  <!-- Image preview -->
  <div x-show="pendingImage" x-cloak class="border-t border-slate-200 bg-white">
    <div class="max-w-3xl mx-auto px-4 py-2 flex items-center gap-3">
      <img :src="pendingImage" class="h-14 w-14 rounded-lg object-cover border border-slate-200" alt="">
      <input type="text" x-model="pendingCaption" placeholder="Підпис (необов'язково)" class="flex-1 text-sm border-0 focus:ring-0 px-0 py-1">
      <button type="button" @click="discardImage()" class="text-slate-400 hover:text-slate-700 text-sm">✕</button>
    </div>
  </div>

  <!-- Composer -->
  <footer class="shrink-0 bg-white border-t border-slate-200" style="padding-bottom: env(safe-area-inset-bottom);">
    <div class="max-w-3xl mx-auto px-3 sm:px-4 py-2.5">
      <form @submit.prevent="submit()" class="flex items-end gap-2">

        <!-- Image -->
        <label class="shrink-0 p-2 rounded-full hover:bg-slate-100 text-slate-500 hover:text-slate-900 cursor-pointer transition" title="Прикріпити фото">
          <input type="file" accept="image/*" class="hidden" @change="pickImage($event)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
        </label>

        <!-- Text input -->
        <textarea x-ref="ta" x-model="draft"
                  @keydown.enter.prevent="onEnter($event)"
                  @input="autosize()"
                  rows="1"
                  placeholder="Напишіть повідомлення…"
                  :disabled="sending || recording"
                  class="flex-1 resize-none min-h-[40px] max-h-40 px-3 py-2 rounded-2xl border border-slate-200 focus:border-slate-900 focus:ring-0 text-[15px] leading-snug bg-slate-50"></textarea>

        <!-- Voice (push-to-talk) — bigger, prominent, gradient -->
        <template x-if="!hasContent && !recording">
          <button type="button"
                  @pointerdown.prevent="startRecording()"
                  @pointerup.prevent="stopRecording()"
                  @pointerleave="stopRecording()"
                  @pointercancel="stopRecording()"
                  @contextmenu.prevent
                  class="shrink-0 w-12 h-12 rounded-full bg-gradient-to-br from-violet-600 to-violet-700 hover:from-violet-700 hover:to-violet-800 text-white transition disabled:opacity-50 shadow-md hover:shadow-lg active:scale-95 flex items-center justify-center select-none"
                  :disabled="sending"
                  title="Натисни і утримуй для запису голосу">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        </template>

        <template x-if="recording">
          <button type="button"
                  @pointerup.prevent="stopRecording()"
                  @pointerleave="stopRecording()"
                  @pointercancel="stopRecording()"
                  @click="stopRecording()"
                  class="shrink-0 w-12 h-12 rounded-full bg-gradient-to-br from-rose-500 to-rose-600 text-white shadow-lg flex items-center justify-center animate-pulse"
                  title="Відпусти щоб зупинити">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </template>

        <template x-if="hasContent">
          <button type="submit"
                  class="shrink-0 p-2.5 rounded-full bg-slate-900 hover:bg-slate-700 text-white transition disabled:opacity-50"
                  :disabled="sending">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </template>
      </form>
    </div>
  </footer>
</div>

<script>
function chatApp({ country, chatId }) {
  return {
    country,
    chatId,
    online: true,
    messages: [],
    draft: '',
    sending: false,
    loadingHistory: true,
    errorMsg: '',
    progressLabel: '',
    pendingImage: null,
    pendingImageBlob: null,
    pendingCaption: '',

    recording: false,
    recDuration: '0:00',
    _recorder: null,
    _recChunks: [],
    _recTimer: null,
    _recStart: 0,
    _recCanceled: false,

    // Voice preview (after stop, before send)
    voicePreviewBlob: null,
    voicePreviewUrl: null,
    voicePreviewDuration: '0:00',
    voicePreviewPlaying: false,
    voicePreviewProgress: 0,

    // Multi-message batching (client-side debounce)
    _batchQueue: [],
    _batchTimer: null,
    _BATCH_MS: 1500,

    get hasContent() {
      return this.draft.trim().length > 0 || !!this.pendingImage;
    },

    async init() {
      window.addEventListener('online', () => this.online = true);
      window.addEventListener('offline', () => this.online = false);
      this.online = navigator.onLine;
      await this.loadHistory();
      this.scrollBottom();
      this.autosize();
    },

    async loadHistory() {
      try {
        const r = await fetch('/api/chat/history', { credentials: 'same-origin' });
        if (r.ok) {
          const d = await r.json();
          this.messages = (d.history || []).map(t => ({ role: t.role, content: t.content || '' }));
        }
      } catch (_) {} finally {
        this.loadingHistory = false;
      }
    },

    autosize() {
      const ta = this.$refs.ta;
      if (!ta) return;
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
    },

    onEnter(e) {
      if (e.shiftKey) {
        // newline
        this.draft += '\n';
        this.$nextTick(() => this.autosize());
        return;
      }
      this.submit();
    },

    scrollBottom() {
      this.$nextTick(() => {
        const el = this.$refs.scrollArea;
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    setError(msg) {
      this.errorMsg = msg;
      setTimeout(() => { if (this.errorMsg === msg) this.errorMsg = ''; }, 4000);
    },

    async submit() {
      // Image with optional caption — combined send.
      if (this.pendingImage) {
        if (this.draft.trim() && !this.pendingCaption.trim()) {
          this.pendingCaption = this.draft.trim();
        }
        this.draft = '';
        this.autosize();
        await this.sendImage();
        return;
      }
      const text = this.draft.trim();
      if (!text) return;
      this.draft = '';
      this.autosize();
      // Show bubble immediately. Queue з debounce 1.5s — AI відповідає
      // на всі повідомлення разом (контекст не дробиться).
      this.messages.push({ role: 'user', content: text });
      this.scrollBottom();
      this._enqueueText(text);
    },

    _enqueueText(text) {
      this._batchQueue.push(text);
      if (this._batchTimer) clearTimeout(this._batchTimer);
      this._batchTimer = setTimeout(() => this._flushBatch(), this._BATCH_MS);
    },

    async _flushBatch() {
      if (this._batchQueue.length === 0 || this.sending) return;
      const combined = this._batchQueue.join('\n');
      this._batchQueue = [];
      this._batchTimer = null;
      await this._sendText(combined);
    },

    async _sendText(text) {
      this.sending = true;
      this.progressLabel = '';
      try {
        const fd = new FormData();
        fd.append('text', text);
        const r = await fetch('/api/chat/send-stream', { method: 'POST', body: fd, credentials: 'same-origin' });
        if (r.status === 400) { this.handleNotAuth(); return; }
        if (!r.ok) throw new Error('Помилка відправки');
        await this._consumeSSE(r);
      } catch (e) {
        this.setError(e.message || 'Помилка мережі');
      } finally {
        this.sending = false;
        this.progressLabel = '';
        this.scrollBottom();
      }
    },

    async _consumeSSE(response) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf('\n\n')) !== -1) {
          const raw = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          if (!raw.startsWith('data: ')) continue;
          let ev;
          try { ev = JSON.parse(raw.slice(6)); } catch { continue; }
          this._handleSSE(ev);
        }
      }
    },

    _handleSSE(ev) {
      if (ev.type === 'tool') {
        this.progressLabel = ev.label || '';
        this.scrollBottom();
      } else if (ev.type === 'reply') {
        this.messages.push({ role: 'assistant', content: ev.text || '' });
        this.progressLabel = '';
        this.scrollBottom();
      } else if (ev.type === 'error') {
        this.setError(ev.message || 'Помилка');
      }
    },

    pickImage(ev) {
      const f = ev.target.files && ev.target.files[0];
      ev.target.value = '';
      if (!f) return;
      if (f.size > 10 * 1024 * 1024) { this.setError('Файл більше 10 МБ'); return; }
      this.pendingImageBlob = f;
      const reader = new FileReader();
      reader.onload = e => { this.pendingImage = e.target.result; };
      reader.readAsDataURL(f);
    },

    discardImage() {
      this.pendingImage = null;
      this.pendingImageBlob = null;
      this.pendingCaption = '';
    },

    async sendImage() {
      if (!this.pendingImageBlob || this.sending) return;
      const previewSrc = this.pendingImage;
      const caption = this.pendingCaption.trim();
      this.messages.push({ role: 'user', content: caption || '[фото]', image: previewSrc });
      this.scrollBottom();
      this.sending = true;
      try {
        const fd = new FormData();
        fd.append('image', this.pendingImageBlob, this.pendingImageBlob.name || 'photo.jpg');
        if (caption) fd.append('caption', caption);
        this.discardImage();
        const r = await fetch('/api/chat/image', { method: 'POST', body: fd, credentials: 'same-origin' });
        if (!r.ok) throw new Error('Помилка завантаження фото');
        const d = await r.json();
        this.messages.push({ role: 'assistant', content: d.reply || '' });
      } catch (e) {
        this.setError(e.message || 'Помилка мережі');
      } finally {
        this.sending = false;
        this.scrollBottom();
      }
    },

    async startRecording() {
      if (this.recording || this.sending) return;
      if (!navigator.mediaDevices || !window.MediaRecorder) {
        this.setError('Запис голосу не підтримується у браузері');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                   : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                   : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
                   : '';
        this._recorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
        this._recChunks = [];
        this._recCanceled = false;
        this._recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) this._recChunks.push(e.data); };
        this._recorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          this.recording = false;
          if (this._recCanceled) { this._recCanceled = false; return; }
          const blob = new Blob(this._recChunks, { type: this._recorder.mimeType || 'audio/webm' });
          if (blob.size > 0) {
            // Preview: AI чекає на підтвердження клієнта (replay / re-record / send)
            this.voicePreviewBlob = blob;
            this.voicePreviewUrl = URL.createObjectURL(blob);
            this.voicePreviewDuration = this.recDuration;
          }
        };
        this._recorder.start();
        this.recording = true;
        this._recStart = Date.now();
        this._tickDuration();
        this._recTimer = setInterval(() => this._tickDuration(), 500);
      } catch (e) {
        this.setError('Немає доступу до мікрофона');
      }
    },

    _tickDuration() {
      const s = Math.floor((Date.now() - this._recStart) / 1000);
      const mm = Math.floor(s / 60);
      const ss = String(s % 60).padStart(2, '0');
      this.recDuration = `${mm}:${ss}`;
    },

    stopRecording() {
      if (!this.recording) return;
      clearInterval(this._recTimer);
      try { this._recorder.stop(); } catch (_) {}
    },

    cancelRecording() {
      if (!this.recording) return;
      this._recCanceled = true;
      clearInterval(this._recTimer);
      try { this._recorder.stop(); } catch (_) {}
    },

    discardVoicePreview() {
      try { this.$refs.previewAudio && this.$refs.previewAudio.pause(); } catch(_) {}
      if (this.voicePreviewUrl) URL.revokeObjectURL(this.voicePreviewUrl);
      this.voicePreviewBlob = null;
      this.voicePreviewUrl = null;
      this.voicePreviewDuration = '0:00';
      this.voicePreviewPlaying = false;
      this.voicePreviewProgress = 0;
    },

    toggleVoicePreview() {
      const a = this.$refs.previewAudio;
      if (!a) return;
      if (a.paused) {
        a.play().then(() => this.voicePreviewPlaying = true).catch(() => {});
      } else {
        a.pause();
        this.voicePreviewPlaying = false;
      }
    },

    onPreviewProgress() {
      const a = this.$refs.previewAudio;
      if (!a || !a.duration || !isFinite(a.duration)) return;
      this.voicePreviewProgress = Math.round((a.currentTime / a.duration) * 100);
    },

    async sendVoicePreview() {
      if (!this.voicePreviewBlob) return;
      const blob = this.voicePreviewBlob;
      this.discardVoicePreview();
      await this._uploadVoice(blob);
    },

    async rerecordVoice() {
      this.discardVoicePreview();
      await this.startRecording();
    },

    async _uploadVoice(blob) {
      this.messages.push({ role: 'user', content: '🎙 голосове…' });
      this.scrollBottom();
      this.sending = true;
      try {
        const fd = new FormData();
        const ext = (blob.type.includes('mp4') ? 'm4a' : 'webm');
        fd.append('audio', blob, `voice.${ext}`);
        const r = await fetch('/api/chat/voice', { method: 'POST', body: fd, credentials: 'same-origin' });
        if (!r.ok) throw new Error('Помилка відправки голосу');
        const d = await r.json();
        const last = this.messages[this.messages.length - 1];
        if (last && last.role === 'user') last.content = d.transcript ? d.transcript : '🎙 голосове';
        this.messages.push({ role: 'assistant', content: d.reply || '' });
      } catch (e) {
        this.setError(e.message || 'Помилка мережі');
      } finally {
        this.sending = false;
        this.scrollBottom();
      }
    },

    escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/\n/g, '<br>');
    },

    renderMd(text) {
      // Safe minimal markdown for ASSISTANT replies:
      // 1) escape HTML, 2) **bold**, 3) *italic*, 4) `code`,
      // 5) URLs → links (rel=nofollow noopener), 6) line breaks.
      // НЕ підтримуємо raw HTML, скрипти, події.
      if (!text) return '';
      // LLM іноді віддає текст з відступами на початку рядків — прибираємо
      text = String(text).split('\n').map(l => l.replace(/^[ \t]+/, '')).join('\n').trim();
      const esc = (s) => s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
      let s = esc(text);
      // links (http/https only, validated)
      s = s.replace(/\b(https?:\/\/[^\s<>"']+)/g, (m) => {
        const u = m.replace(/[.,;:!?)]+$/, '');
        const trail = m.slice(u.length);
        return `<a href="${u}" target="_blank" rel="nofollow noopener noreferrer" class="underline">${u}</a>${trail}`;
      });
      // inline code
      s = s.replace(/`([^`\n]+)`/g, '<code class="px-1 py-0.5 rounded bg-slate-100 text-[13px]">$1</code>');
      // bold (greedy-safe, no nested *)
      s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      // italic (single *, avoid swallowing **)
      s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
      // line breaks
      s = s.replace(/\n/g, '<br>');
      return s;
    },

    handleNotAuth() {
      // Cookie expired або country не встановлено → редірект на онбординг.
      window.location.href = '/chat';
    },

    async reset() {
      if (!confirm('Почати новий діалог?')) return;
      try {
        await fetch('/api/chat/reset', { method: 'POST', credentials: 'same-origin' });
      } catch (_) {}
      window.location.reload();
    },
  };
}
</script>
{% endblock %}
