{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block body %}
<div class="min-h-full flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500 to-pink-500 shadow-lg mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-900">Beauty AI Admin</h1>
      <p class="text-sm text-slate-500 mt-1">Sign in to manage eval scenarios</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 px-8 py-7">
      {% if error %}
      <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}
      <form method="post" action="/admin/login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
          <input type="email" name="email" required autofocus value="{{ email or '' }}"
                 class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" name="password" required
                 class="w-full px-3.5 py-2.5 rounded-lg border border-slate-300 focus:border-violet-500 focus:ring-2 focus:ring-violet-100 outline-none transition">
        </div>
        <button type="submit"
                class="w-full mt-2 px-4 py-2.5 rounded-lg bg-slate-900 hover:bg-slate-800 text-white font-medium text-sm transition">
          Sign in
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6">
      Need an account? Create via CLI: <code class="px-1.5 py-0.5 bg-slate-100 rounded">python -m scripts.seed_admin</code>
    </p>
  </div>
</div>
{% endblock %}
